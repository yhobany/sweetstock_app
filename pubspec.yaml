name: sweetstock_app
description: "App de gestión de inventarios y tesorería"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ... tus otras dependencias ...
  image_cropper: ^8.0.2

  # --- 1. Visuales ---
  cupertino_icons: ^1.0.8
  intl: ^0.18.1
  google_fonts: ^6.1.0

  # --- 2. Hardware (Cámara y Sensores) ---
  # Dejamos que el solucionador de dependencias elija las versiones compatibles.
  camera: any
  google_mlkit_barcode_scanning: any
  google_mlkit_text_recognition: any

  # --- 3. Base de Datos ---
  # Usamos versiones recientes y compatibles
  firebase_core: ^2.31.0
  cloud_firestore: ^4.17.3
  firebase_auth: ^4.16.0

  # --- NUEVAS DEPENDENCIAS (Archivos y Compartir) ---
  path_provider: ^2.1.1
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
